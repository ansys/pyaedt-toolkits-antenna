version: 2
updates:
  - package-ecosystem: "uv" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Europe/Paris"
      groups:
        direct-dependencies:
          applies-to: version-updates
          patterns:
            - "ansys-aedt-toolkits-common"
            - "ansys-tools-visualization-interface"
            - "typer"
        dev-dependencies:
          applies-to: version-updates
          patterns:
            # Documentation
            - "ansys-sphinx-theme"
            - "ipython"
            - "ipywidgets"
            - "jupyterlab"
            - "jupytext"
            - "nbsphinx"
            - "numpydoc"
            - "pypandoc"
            - "recommonmark"
            - "Sphinx"
            - "sphinx-autobuild"
            - "sphinx-copybutton"
            - "sphinx_design"
            - "pyvista"
            # Lint / Format
            - "prek"
            # Test
            - "pytest"
            - "pytest-cov"
            - "pytest-qt"
            - "flask"
            - "pyside6"
        transitive-dependencies:
          applies-to: version-updates
          patterns:
            - "*"
        security-updates:
          applies-to: security-updates
          patterns:
            - "*"
    cooldown:
      default-days: 7
      include:
        - "*"  # Include all dependencies in cooldown
      exclude:
        - "ansys-*"
        - "pyaedt"
        - "pyedb"
    assignees:
      - "Samuelopez-ansys"
    labels:
      - "maintenance"
      - "dependencies"
      - dependency-name: "flask"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "pyside6"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "ipython"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "ipywidgets"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "jupyterlab"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "jupytext"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "nbsphinx"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "numpydoc"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "pypandoc"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "recommonmark"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "Sphinx"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "sphinx-autobuild"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "sphinx-copybutton"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "sphinx_design"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "prek"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "pytest"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "pytest-cov"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "pytest-qt"
        update-types: [ "version-update:semver-patch" ]
    commit-message:
      prefix: "BUILD(uv)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Europe/Paris"
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
    cooldown:
      default-days: 10 # Fallback cooldown if no specific rule applies
      include:
        - "*"  # Include all dependencies in cooldown
      exclude:
        - "ansys/actions"
    assignees:
      - "Samuelopez-ansys"
    labels:
      - "maintenance"
      - "dependencies"
    ignore:
      - dependency-name: "actions/*"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "astral-sh/*"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "codecov/*"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "micnncim/*"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "peter-evans/*"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "pypa/*"
        update-types: [ "version-update:semver-patch" ]
    commit-message:
      prefix: "BUILD(actions)"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Europe/Paris"
    groups:
      precommit:
        applies-to: version-updates
        patterns:
          - "*"
      precommit-security:
        applies-to: security-updates
        patterns:
          - "*"
    cooldown:
      default-days: 7 # Fallback cooldown if no specific rule applies
      include:
        - "*"  # Include all dependencies in cooldown
      exclude:
        - "ansys/pre-commit-hooks"
    assignees:
      - "Samuelopez-ansys"
    labels:
      - "maintenance"
      - "dependencies"
    ignore:
      - dependency-name: "https://github.com/adamchainz/blacken-docs"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "https://github.com/codespell-project/codespell"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "https://github.com/pre-commit/pre-commit-hooks"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "https://github.com/pre-commit-ci/pre-commit-ci-config"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "https://github.com/psf/black"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "https://github.com/PyCQA/flake8"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "https://github.com/pycqa/isort"
        update-types: [ "version-update:semver-patch" ]
      - dependency-name: "https://github.com/python-jsonschema/check-jsonschema"
        update-types: [ "version-update:semver-patch" ]
    commit-message:
      prefix: "BUILD(pre-commit)"