# Example antenna configuration file
# This YAML file demonstrates how to configure antenna parameters for the CLI

# Synthesis parameters: used to calculate antenna dimensions
synthesis:
  frequency: 2.4                 # Operating frequency in GHz
  substrate_height: 1.6          # Substrate thickness in mm
  permittivity: 4.4              # Relative permittivity (εr)
  length_unit: "mm"              # Units: mm, cm, in, mil
  outer_boundary: "Radiation"    # Boundary condition

# Setup parameters: used when creating antenna in AEDT (create command only)
setup:
  create_setup: true             # Create analysis setup
  component_3d: false            # Create 3D component
  lattice_pair: false            # Create lattice pair
  sweep: 20                      # Sweep percentage (default: 20)
  num_cores: 4                   # Number of cores for analysis

# Additional antenna-specific parameters
param:
  # Add any antenna-specific parameters here
  # Example:
  # flare_angle: 15
  # waveguide_type: "WR90"

